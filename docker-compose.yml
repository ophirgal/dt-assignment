services:
  database:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: appuser
      DB_PASSWORD: secret
      DB_NAME: appdb
      GIN_MODE: release
    depends_on:
      - database

  frontend:
    build: ./frontend
    ports:
      - "5000:80"
    depends_on:
      - backend

volumes:
  pgdata:
